<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etiqueta de Soro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="etiqueta">
    <h2>ETIQUETA DE MEDICAÇÃO</h2>

    <div class="campo">
      <label>Nome do Paciente:</label>
      <span id="nomePaciente"></span>
    </div>

    <div class="campo">
      <label>Nome da Mãe:</label>
      <span id="nomeMae"></span>
    </div>

    <div class="campo">
      <label>Data de Nascimento:</label>
      <span id="dataNascimento"></span>
    </div>

    <div class="campo">
      <label>Medicação:</label>
      <span id="medicacao"></span>
    </div>

    <div class="campo">
      <label>Alergias:</label>
      <span id="alergias"></span>
    </div>

    <div class="campo">
      <label>Médico Prescritor:</label>
      <span id="medico"></span>
    </div>

    <div class="campo">
      <label>Data da Medicação:</label>
      <span id="dataMedicacao"></span>
    </div>

    <div class="campo">
      <label>Profissional que preparou:</label>
      <span id="profissional"></span>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
